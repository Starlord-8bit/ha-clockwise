<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background: dark panel -->
  <rect width="100" height="100" rx="12" fill="#0d0d0d"/>
  
  <!-- LED dot grid background (dim dots = unlit LEDs) -->
  <!-- 10x10 grid of dots, 8px spacing, starting at x=6, y=6 -->
  <g fill="#1a2a1a" opacity="0.6">
    <!-- Row 1 -->
    <circle cx="11" cy="11" r="3.2"/><circle cx="21" cy="11" r="3.2"/><circle cx="31" cy="11" r="3.2"/>
    <circle cx="41" cy="11" r="3.2"/><circle cx="51" cy="11" r="3.2"/><circle cx="61" cy="11" r="3.2"/>
    <circle cx="71" cy="11" r="3.2"/><circle cx="81" cy="11" r="3.2"/><circle cx="91" cy="11" r="3.2"/>
    <!-- Row 2 -->
    <circle cx="11" cy="21" r="3.2"/><circle cx="21" cy="21" r="3.2"/><circle cx="31" cy="21" r="3.2"/>
    <circle cx="41" cy="21" r="3.2"/><circle cx="51" cy="21" r="3.2"/><circle cx="61" cy="21" r="3.2"/>
    <circle cx="71" cy="21" r="3.2"/><circle cx="81" cy="21" r="3.2"/><circle cx="91" cy="21" r="3.2"/>
    <!-- Row 3 -->
    <circle cx="11" cy="31" r="3.2"/><circle cx="21" cy="31" r="3.2"/><circle cx="31" cy="31" r="3.2"/>
    <circle cx="41" cy="31" r="3.2"/><circle cx="51" cy="31" r="3.2"/><circle cx="61" cy="31" r="3.2"/>
    <circle cx="71" cy="31" r="3.2"/><circle cx="81" cy="31" r="3.2"/><circle cx="91" cy="31" r="3.2"/>
    <!-- Row 4 -->
    <circle cx="11" cy="41" r="3.2"/><circle cx="21" cy="41" r="3.2"/><circle cx="31" cy="41" r="3.2"/>
    <circle cx="41" cy="41" r="3.2"/><circle cx="51" cy="41" r="3.2"/><circle cx="61" cy="41" r="3.2"/>
    <circle cx="71" cy="41" r="3.2"/><circle cx="81" cy="41" r="3.2"/><circle cx="91" cy="41" r="3.2"/>
    <!-- Row 5 -->
    <circle cx="11" cy="51" r="3.2"/><circle cx="21" cy="51" r="3.2"/><circle cx="31" cy="51" r="3.2"/>
    <circle cx="41" cy="51" r="3.2"/><circle cx="51" cy="51" r="3.2"/><circle cx="61" cy="51" r="3.2"/>
    <circle cx="71" cy="51" r="3.2"/><circle cx="81" cy="51" r="3.2"/><circle cx="91" cy="51" r="3.2"/>
    <!-- Row 6 -->
    <circle cx="11" cy="61" r="3.2"/><circle cx="21" cy="61" r="3.2"/><circle cx="31" cy="61" r="3.2"/>
    <circle cx="41" cy="61" r="3.2"/><circle cx="51" cy="61" r="3.2"/><circle cx="61" cy="61" r="3.2"/>
    <circle cx="71" cy="61" r="3.2"/><circle cx="81" cy="61" r="3.2"/><circle cx="91" cy="61" r="3.2"/>
    <!-- Row 7 -->
    <circle cx="11" cy="71" r="3.2"/><circle cx="21" cy="71" r="3.2"/><circle cx="31" cy="71" r="3.2"/>
    <circle cx="41" cy="71" r="3.2"/><circle cx="51" cy="71" r="3.2"/><circle cx="61" cy="71" r="3.2"/>
    <circle cx="71" cy="71" r="3.2"/><circle cx="81" cy="71" r="3.2"/><circle cx="91" cy="71" r="3.2"/>
    <!-- Row 8 -->
    <circle cx="11" cy="81" r="3.2"/><circle cx="21" cy="81" r="3.2"/><circle cx="31" cy="81" r="3.2"/>
    <circle cx="41" cy="81" r="3.2"/><circle cx="51" cy="81" r="3.2"/><circle cx="61" cy="81" r="3.2"/>
    <circle cx="71" cy="81" r="3.2"/><circle cx="81" cy="81" r="3.2"/><circle cx="91" cy="81" r="3.2"/>
    <!-- Row 9 -->
    <circle cx="11" cy="91" r="3.2"/><circle cx="21" cy="91" r="3.2"/><circle cx="31" cy="91" r="3.2"/>
    <circle cx="41" cy="91" r="3.2"/><circle cx="51" cy="91" r="3.2"/><circle cx="61" cy="91" r="3.2"/>
    <circle cx="71" cy="91" r="3.2"/><circle cx="81" cy="91" r="3.2"/><circle cx="91" cy="91" r="3.2"/>
  </g>

  <!-- Lit LEDs: "1 2" pixel digits (simplified 3x5 font) -->
  <!-- Digit "1" at col 1-3, rows 2-6 -->
  <g fill="#00e060" filter="url(#glow)">
    <!-- 1: -->
    <circle cx="21" cy="21" r="3.5"/>
    <circle cx="21" cy="31" r="3.5"/>
    <circle cx="21" cy="41" r="3.5"/>
    <circle cx="21" cy="51" r="3.5"/>
    <circle cx="21" cy="61" r="3.5"/>
    <!-- : (colon) blink dots -->
    <circle cx="41" cy="31" r="3.5"/>
    <circle cx="41" cy="51" r="3.5"/>
    <!-- 2: top bar -->
    <circle cx="51" cy="21" r="3.5"/>
    <circle cx="61" cy="21" r="3.5"/>
    <circle cx="71" cy="21" r="3.5"/>
    <!-- right top -->
    <circle cx="71" cy="31" r="3.5"/>
    <!-- middle bar -->
    <circle cx="51" cy="41" r="3.5"/>
    <circle cx="61" cy="41" r="3.5"/>
    <circle cx="71" cy="41" r="3.5"/>
    <!-- left bottom -->
    <circle cx="51" cy="51" r="3.5"/>
    <!-- bottom bar -->
    <circle cx="51" cy="61" r="3.5"/>
    <circle cx="61" cy="61" r="3.5"/>
    <circle cx="71" cy="61" r="3.5"/>
  </g>

  <!-- Scanline overlay for CRT feel -->
  <rect width="100" height="100" rx="12" fill="url(#scanlines)" opacity="0.08"/>

  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scanlines" width="2" height="2" patternUnits="userSpaceOnUse">
      <rect width="2" height="1" fill="black"/>
    </pattern>
  </defs>
</svg>
